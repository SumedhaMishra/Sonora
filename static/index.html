<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonora</title>
    <link rel="icon" type="image/jpeg" href="https://tse2.mm.bing.net/th/id/OIP.IigKW_uqkI4ZzCpnGWbh3gAAAA?r=0&rs=1&pid=ImgDetMain&o=7&rm=3">
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#f472b6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Sonora">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #fff5f5;
            --surface: #ffffff;
            --surface-hover: #fff0f3;
            --surface-raised: #ffffff;
            --border: #ec8fad;
            --text: #4a3347;
            --text-secondary: #9b7a90;
            --text-dim: #c9a5b8;
            --accent: #f472b6;
            --accent-glow: rgba(244, 114, 182, 0.15);
            --green: #f472b6;
            --radius: 0px;
            --pixel: 3px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Press Start 2P', monospace;
            background: #f8e8ee;
            background-image: url('https://i.pinimg.com/originals/c6/04/6b/c6046b727a36cd4c0b3e11eac514e2ae.jpg');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            image-rendering: pixelated;
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
            letter-spacing: 0.02em;
            font-size: 10px;
            line-height: 1.8;
        }

        /* ---- Ambient background ---- */
        .ambient {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,245,248,0.55);
            pointer-events: none;
            z-index: 0;
        }

        /* Floating decorations - hide smooth doodles */
        .doodle { display: none; }

        .doodle-heart {
            top: 120px;
            right: 12%;
            animation: floatA 7s ease-in-out infinite;
        }

        .doodle-star {
            top: 30%;
            left: 8%;
            animation: floatB 9s ease-in-out infinite;
        }

        .doodle-note {
            bottom: 25%;
            right: 10%;
            animation: floatA 11s ease-in-out infinite 1s;
        }

        .doodle-cloud {
            top: 8%;
            left: 15%;
            animation: floatB 13s ease-in-out infinite 0.5s;
        }

        @keyframes floatA {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-18px) rotate(5deg); }
        }

        @keyframes floatB {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(14px) rotate(-4deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* ---- Header ---- */
        header {
            padding: 60px 0 10px;
            text-align: center;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: #fbb6ce;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #ec4899;
            border: var(--pixel) solid #db2777;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
        }

        .logo h1 {
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #be185d;
            text-shadow: 2px 2px 0 #fbb6ce;
        }

        header p {
            color: var(--text-secondary);
            font-size: 0.55rem;
            font-weight: 400;
        }

        /* ---- Search ---- */
        .search-wrap {
            margin: 28px 0 8px;
            position: relative;
        }

        .search-wrap svg {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-dim);
            pointer-events: none;
            transition: color 0.2s;
        }

        .search-wrap input {
            width: 100%;
            padding: 14px 130px 14px 48px;
            border: var(--pixel) solid var(--border);
            border-radius: 0;
            font-size: 0.65rem;
            font-family: 'Press Start 2P', monospace;
            background: rgba(255,255,255,0.92);
            color: var(--text);
            outline: none;
            transition: none;
            box-shadow: var(--pixel) var(--pixel) 0 #d6739b;
        }

        .search-wrap input::placeholder { color: var(--text-dim); font-size: 0.55rem; }

        .search-wrap input:focus {
            border-color: #ec4899;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
        }

        .search-wrap input:focus ~ svg { color: var(--accent); }

        .search-wrap button {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            padding: 10px 18px;
            border: var(--pixel) solid #db2777;
            border-radius: 0;
            background: #f472b6;
            color: #fff;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.55rem;
            font-weight: 700;
            cursor: pointer;
            transition: none;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
            text-shadow: 1px 1px 0 #db2777;
        }

        .search-wrap button:hover { background: #ec4899; }
        .search-wrap button:active { transform: translateY(-50%) translate(var(--pixel), var(--pixel)); box-shadow: none; }
        .search-wrap button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ---- Status ---- */
        .status {
            text-align: center;
            padding: 12px 0 4px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            min-height: 28px;
        }

        .status.error { color: var(--accent); }

        /* ---- Loading spinner ---- */
        .spinner {
            display: none;
            justify-content: center;
            padding: 40px 0;
        }

        .spinner.active { display: flex; }

        .spinner div {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 0;
            margin: 0 6px;
            animation: blink 0.8s infinite steps(1);
        }

        .spinner div:nth-child(2) { animation-delay: 0.25s; }
        .spinner div:nth-child(3) { animation-delay: 0.5s; }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        @keyframes bounce {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.15; }
        }

        /* ---- Results ---- */
        .results {
            display: flex;
            flex-direction: column;
            gap: 2px;
            padding-bottom: 140px;
        }

        .album-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 18px 14px 8px;
            margin-top: 6px;
        }

        .album-header:first-child { margin-top: 0; }

        .album-header .album-bar {
            height: 2px;
            flex: 1;
            background: rgba(236,143,173,0.25);
            border-radius: 1px;
        }

        .album-header .album-name {
            font-size: 0.5rem;
            font-weight: 700;
            color: #be185d;
            white-space: nowrap;
        }

        .album-header .album-count {
            font-size: 0.4rem;
            color: var(--text-dim);
            font-weight: 500;
            white-space: nowrap;
        }

        /* ---- Artist Profile ---- */
        .artist-profile {
            display: none;
            padding-bottom: 140px;
        }

        .artist-profile.active { display: block; }

        .artist-hero {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 24px 0 20px;
        }

        .artist-hero-img {
            width: 80px;
            height: 80px;
            border-radius: 0;
            object-fit: cover;
            border: var(--pixel) solid #f472b6;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
            background: #fce7f3;
            flex-shrink: 0;
            image-rendering: pixelated;
        }

        .artist-hero-info h2 {
            font-size: 0.7rem;
            font-weight: 700;
            color: #be185d;
            line-height: 1.2;
        }

        .artist-hero-info p {
            font-size: 0.45rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .artist-hero-actions {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .artist-hero-actions button {
            padding: 7px 14px;
            border: var(--pixel) solid #db2777;
            border-radius: 0;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.4rem;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .artist-hero-actions button:hover { opacity: 0.85; }

        .artist-hero-actions .btn-search {
            background: #f472b6;
            color: #fff;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
        }

        .artist-back {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.5rem;
            font-weight: 600;
            padding: 6px 0;
            display: flex;
            align-items: center;
            gap: 4px;
            transition: color 0.15s;
        }

        .artist-back:hover { color: var(--accent); }
        .artist-back svg { width: 16px; height: 16px; }

        .song-card {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-radius: 0;
            gap: 12px;
            cursor: default;
            transition: none;
            animation: fadeUp 0.1s steps(3) both;
            border: 2px solid transparent;
        }

        .song-card:hover {
            background: rgba(255,255,255,0.92);
            border-color: var(--border);
            box-shadow: var(--pixel) var(--pixel) 0 #d6739b;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .song-num {
            width: 22px;
            text-align: center;
            font-size: 0.5rem;
            color: var(--text-dim);
            flex-shrink: 0;
            font-variant-numeric: tabular-nums;
        }

        .song-thumb {
            width: 44px;
            height: 44px;
            object-fit: cover;
            border-radius: 0;
            flex-shrink: 0;
            background: #fce7f3;
            border: var(--pixel) solid #d6739b;
            image-rendering: pixelated;
        }

        .song-info {
            flex: 1;
            min-width: 0;
        }

        .song-info .title {
            font-size: 0.55rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.35;
        }

        .song-info .meta {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.45rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .song-info .meta .dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .song-dur {
            font-size: 0.5rem;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            min-width: 40px;
            text-align: right;
            flex-shrink: 0;
        }

        .play-btn {
            width: 34px;
            height: 34px;
            border: var(--pixel) solid #db2777;
            border-radius: 0;
            background: #f472b6;
            color: #fff;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.8);
            transition: none;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
        }

        .song-card:hover .play-btn { opacity: 1; transform: scale(1); }
        .play-btn:hover { background: #ec4899; }
        .play-btn:active { transform: translate(var(--pixel), var(--pixel)) !important; box-shadow: none; }

        .play-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
        }

        .play-btn.loading {
            opacity: 1 !important;
            background: #fce7f3;
            color: var(--accent);
            animation: blink 0.6s infinite steps(1);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .play-btn.active-song {
            opacity: 1 !important;
            background: #db2777;
        }

        /* ---- Player ---- */
        .player {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255,255,255,0.96);
            border-top: var(--pixel) solid var(--border);
            padding: 0;
            z-index: 100;
            transform: translateY(100%);
            transition: transform 0.2s steps(4);
            box-shadow: 0 calc(-1 * var(--pixel)) 0 #d6739b;
        }

        .player.active { transform: translateY(0); }

        .player-progress {
            width: 100%;
            height: 6px;
            background: #fce7f3;
            cursor: pointer;
            position: relative;
        }

        .player-progress-fill {
            height: 100%;
            background: #ec4899;
            width: 0%;
            border-radius: 0;
            transition: width 0.3s steps(10);
        }

        .player-inner {
            display: flex;
            align-items: center;
            padding: 12px 24px;
            gap: 16px;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        .player-info .p-title {
            font-size: 0.55rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .player-info .p-sub {
            font-size: 0.45rem;
            color: var(--text-secondary);
            margin-top: 1px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, background 0.2s;
        }

        .ctrl-btn:hover { color: var(--text); background: rgba(244,114,182,0.1); }

        .ctrl-btn svg { width: 20px; height: 20px; }
        .ctrl-btn.main-ctrl svg { width: 28px; height: 28px; }
        .ctrl-btn.main-ctrl { color: var(--accent); }

        .player-time {
            font-size: 0.45rem;
            color: var(--text-dim);
            font-variant-numeric: tabular-nums;
            min-width: 80px;
            text-align: right;
        }

        .player-close {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px;
            border-radius: 50%;
            transition: color 0.15s;
        }

        .player-close:hover { color: var(--text); }
        .player-close svg { width: 16px; height: 16px; }

        /* ---- Empty state ---- */
        .empty-state {
            padding: 20px 0;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.3;
        }

        .empty-state p { font-size: 0.9rem; line-height: 1.6; }

        .suggestions {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
        }

        .suggestions button {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 20px;
            font-family: inherit;
            font-size: 0.8rem;
            cursor: pointer;
            transition: border-color 0.2s, color 0.2s;
        }

        .suggestions button:hover {
            border-color: rgba(255,255,255,0.15);
            color: var(--text);
        }

        /* ---- Mood Collections ---- */
        .collections {
            padding-bottom: 30px;
        }

        .collections-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 16px;
            padding-left: 2px;
        }

        .mood-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-auto-rows: auto;
            gap: 14px;
            margin-bottom: 32px;
        }

        .mood-card {
            position: relative;
            border-radius: 0;
            padding: 16px 14px 14px;
            cursor: pointer;
            overflow: hidden;
            transition: none;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .mood-card:nth-child(1) { grid-column: span 2; }
        .mood-card:nth-child(5) { grid-column: span 2; }
        .mood-card:nth-child(odd) { transform: none; }
        .mood-card:nth-child(even) { transform: none; }

        .mood-card:hover {
            transform: translate(calc(-1 * var(--pixel)), calc(-1 * var(--pixel))) !important;
            box-shadow: calc(var(--pixel) * 2) calc(var(--pixel) * 2) 0 rgba(0,0,0,0.15);
        }

        .mood-card .mood-name {
            font-size: 0.6rem;
            font-weight: 700;
            line-height: 1.4;
        }

        .mood-card .mood-sub {
            font-size: 0.4rem;
            opacity: 0.7;
            margin-top: 4px;
            font-weight: 500;
        }

        /* Mood color themes - solid pixel borders */
        .mood-romance   { background: rgba(252,231,243,0.9); color: #9d174d; border: var(--pixel) solid #f472b6; box-shadow: var(--pixel) var(--pixel) 0 #be185d; }
        .mood-breakup   { background: rgba(237,233,254,0.9); color: #5b21b6; border: var(--pixel) solid #a78bfa; box-shadow: var(--pixel) var(--pixel) 0 #6d28d9; }
        .mood-gym       { background: rgba(254,243,199,0.9); color: #92400e; border: var(--pixel) solid #fbbf24; box-shadow: var(--pixel) var(--pixel) 0 #b45309; }
        .mood-chill      { background: rgba(207,250,254,0.9); color: #155e75; border: var(--pixel) solid #22d3ee; box-shadow: var(--pixel) var(--pixel) 0 #0e7490; }
        .mood-party     { background: rgba(250,232,255,0.9); color: #86198f; border: var(--pixel) solid #d946ef; box-shadow: var(--pixel) var(--pixel) 0 #a21caf; }
        .mood-sad       { background: rgba(224,231,255,0.9); color: #3730a3; border: var(--pixel) solid #818cf8; box-shadow: var(--pixel) var(--pixel) 0 #4338ca; }
        .mood-road      { background: rgba(220,252,231,0.9); color: #166534; border: var(--pixel) solid #4ade80; box-shadow: var(--pixel) var(--pixel) 0 #15803d; }
        .mood-focus     { background: rgba(241,245,249,0.9); color: #334155; border: var(--pixel) solid #94a3b8; box-shadow: var(--pixel) var(--pixel) 0 #475569; }
        .mood-hype      { background: rgba(254,226,226,0.9); color: #991b1b; border: var(--pixel) solid #f87171; box-shadow: var(--pixel) var(--pixel) 0 #b91c1c; }
        .mood-throwback { background: rgba(254,249,195,0.9); color: #854d0e; border: var(--pixel) solid #facc15; box-shadow: var(--pixel) var(--pixel) 0 #a16207; }
        .mood-bollywood { background: rgba(255,237,213,0.9); color: #9a3412; border: var(--pixel) solid #fb923c; box-shadow: var(--pixel) var(--pixel) 0 #c2410c; }
        .mood-latino    { background: rgba(204,251,241,0.9); color: #115e59; border: var(--pixel) solid #2dd4bf; box-shadow: var(--pixel) var(--pixel) 0 #0d9488; }

        /* ---- Quick Artists row ---- */
        .artists-row {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 4px 0 20px;
            scrollbar-width: none;
        }

        .artists-row::-webkit-scrollbar { display: none; }

        .artist-chip {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex-shrink: 0;
            transition: transform 0.15s;
        }

        .artist-chip:hover { transform: scale(1.05); }

        .artist-avatar {
            width: 56px;
            height: 56px;
            border-radius: 0;
            background: rgba(252,231,243,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.55rem;
            font-weight: 600;
            color: var(--accent);
            border: var(--pixel) solid #f472b6;
            box-shadow: var(--pixel) var(--pixel) 0 #9d174d;
            transition: none;
            overflow: hidden;
            image-rendering: pixelated;
        }

        .artist-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
        }

        .artist-chip:hover .artist-avatar {
            border-color: #db2777;
            transform: translate(calc(-1 * var(--pixel)), calc(-1 * var(--pixel)));
            box-shadow: calc(var(--pixel) * 2) calc(var(--pixel) * 2) 0 #9d174d;
        }

        .artist-label {
            font-size: 0.4rem;
            color: var(--text-secondary);
            text-align: center;
            max-width: 64px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .section-label {
            font-size: 0.5rem;
            font-weight: 700;
            color: #b4658a;
            letter-spacing: 0.02em;
            margin-bottom: 14px;
            padding-left: 2px;
        }

        /* ---- Add-to-playlist button ---- */
        .add-btn {
            width: 26px;
            height: 26px;
            border: var(--pixel) solid #d6739b;
            border-radius: 0;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s, color 0.2s, border-color 0.2s;
        }

        .song-card:hover .add-btn { opacity: 1; }
        .add-btn:hover { color: var(--accent); border-color: var(--accent); }
        .add-btn svg { width: 14px; height: 14px; }
        .add-btn.added { color: var(--green); border-color: var(--green); opacity: 1; }

        /* ---- Playlist toggle ---- */
        .pl-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(255,255,255,0.92);
            border: var(--pixel) solid var(--border);
            color: var(--accent);
            width: 42px;
            height: 42px;
            border-radius: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: none;
            box-shadow: var(--pixel) var(--pixel) 0 #d6739b;
        }

        .pl-toggle:hover { color: #db2777; background: #fce7f3; }
        .pl-toggle svg { width: 20px; height: 20px; }

        .pl-toggle .badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: var(--accent);
            color: #fff;
            font-size: 0.6rem;
            font-weight: 700;
            min-width: 16px;
            height: 16px;
            border-radius: 8px;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }

        .pl-toggle .badge.visible { display: flex; }

        /* ---- Playlist panel ---- */
        .pl-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 300;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .pl-overlay.open { opacity: 1; pointer-events: all; }

        .pl-panel {
            position: fixed;
            top: 0;
            right: 0;
            bottom: 0;
            width: 380px;
            max-width: 90vw;
            background: rgba(255,255,255,0.96);
            border-left: var(--pixel) solid var(--border);
            z-index: 301;
            transform: translateX(100%);
            transition: transform 0.2s steps(5);
            display: flex;
            flex-direction: column;
        }

        .pl-panel.open { transform: translateX(0); }

        .pl-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 20px 12px;
            border-bottom: 1px solid var(--border);
        }

        .pl-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .pl-header-actions {
            display: flex;
            gap: 8px;
        }

        .pl-header-btn {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 6px;
            border-radius: 0;
            font-family: 'Press Start 2P', monospace;
            font-size: 0.4rem;
            transition: color 0.15s, background 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .pl-header-btn:hover { color: var(--accent); background: rgba(244,114,182,0.08); }
        .pl-header-btn svg { width: 16px; height: 16px; }

        .pl-body {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
        }

        .pl-empty {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .pl-item {
            display: flex;
            align-items: center;
            padding: 8px 20px;
            gap: 12px;
            transition: background 0.15s;
            cursor: default;
        }

        .pl-item:hover { background: var(--surface-hover); }

        .pl-item.pl-active { background: rgba(244,114,182,0.08); }

        .pl-item-num {
            font-size: 0.75rem;
            color: var(--text-dim);
            width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .pl-item-info {
            flex: 1;
            min-width: 0;
        }

        .pl-item-info .pl-item-title {
            font-size: 0.82rem;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pl-item-info .pl-item-channel {
            font-size: 0.7rem;
            color: var(--text-secondary);
        }

        .pl-item-play {
            width: 26px;
            height: 26px;
            border: var(--pixel) solid #db2777;
            border-radius: 0;
            background: #f472b6;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.15s;
            flex-shrink: 0;
        }

        .pl-item:hover .pl-item-play { opacity: 1; }
        .pl-item-play svg { width: 12px; height: 12px; fill: currentColor; }

        .pl-item-remove {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            padding: 4px;
            border-radius: 4px;
            opacity: 0;
            transition: opacity 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .pl-item:hover .pl-item-remove { opacity: 1; }
        .pl-item-remove:hover { color: var(--accent); }
        .pl-item-remove svg { width: 14px; height: 14px; }

        .pl-footer {
            border-top: 1px solid var(--border);
            padding: 12px 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-align: center;
        }

        /* ---- Responsive ---- */
        @media (max-width: 600px) {
            header { padding: 40px 0 8px; }
            .logo h1 { font-size: 1.3rem; }
            .search-wrap input { padding: 14px 110px 14px 44px; font-size: 0.9rem; }
            .search-wrap button { padding: 9px 18px; font-size: 0.8rem; }
            .song-num { display: none; }
            .song-thumb { width: 42px; height: 42px; }
            .song-dur { display: none; }
            .play-btn, .add-btn { opacity: 1; transform: scale(1); }
            .player-inner { padding: 10px 16px; gap: 12px; }
            .player-time { display: none; }
            .pl-item-play, .pl-item-remove { opacity: 1; }
            .mood-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .mood-card:nth-child(1),
            .mood-card:nth-child(5) { grid-column: span 1; }
            .doodle { display: none; }
        }
    </style>
</head>
<body>

<div class="ambient"></div>

<!-- Hand-drawn doodle decorations -->
<svg class="doodle doodle-heart" width="48" height="44" viewBox="0 0 48 44" fill="none">
    <path d="M24 40S4 28 4 16C4 8 10 4 16 4c4 0 6 2 8 5 2-3 4-5 8-5 6 0 12 4 12 12C44 28 24 40 24 40z" stroke="#f9a8d4" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<svg class="doodle doodle-star" width="40" height="40" viewBox="0 0 40 40" fill="none">
    <path d="M20 4l4.5 11H36l-9 7 3.5 11L20 26l-10.5 7L13 22 4 15h11.5z" stroke="#fcd34d" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
<svg class="doodle doodle-note" width="36" height="44" viewBox="0 0 36 44" fill="none">
    <path d="M12 36V10c0-2 8-6 16-8v4" stroke="#c4b5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <ellipse cx="8" cy="37" rx="7" ry="5" stroke="#c4b5fd" stroke-width="2.2" fill="none"/>
</svg>
<svg class="doodle doodle-cloud" width="64" height="38" viewBox="0 0 64 38" fill="none">
    <path d="M16 34c-7 0-12-5-12-11 0-5 3-9 8-10C14 6 20 2 28 2c10 0 16 6 17 14h1c6 0 10 4 10 9s-4 9-10 9H16z" stroke="#a5f3fc" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>

<!-- Playlist toggle button -->
<button class="pl-toggle" onclick="togglePlaylist()" title="Playlist">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    <span class="badge" id="plBadge">0</span>
</button>

<!-- Playlist overlay + panel -->
<div class="pl-overlay" id="plOverlay" onclick="togglePlaylist()"></div>
<div class="pl-panel" id="plPanel">
    <div class="pl-header">
        <h2>Playlist</h2>
        <div class="pl-header-actions">
            <button class="pl-header-btn" onclick="playAllPlaylist()" title="Play all">
                <svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
                Play all
            </button>
            <button class="pl-header-btn" onclick="clearPlaylist()" title="Clear">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2V6"/></svg>
                Clear
            </button>
            <button class="pl-header-btn" onclick="togglePlaylist()" title="Close">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        </div>
    </div>
    <div class="pl-body" id="plBody">
        <div class="pl-empty" id="plEmpty">nothing here yet!<br>tap + on songs you love</div>
    </div>
    <div class="pl-footer" id="plFooter">0 songs</div>
</div>

<div class="container">
    <header>
        <div class="logo" onclick="goHome()" style="cursor:pointer">
            <div class="logo-icon">&#9835;</div>
            <h1>Sonora</h1>
        </div>
        <p>find your vibe, hit play &hearts;</p>
    </header>

    <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="what do you wanna listen to?" autofocus>
        <button id="searchBtn" onclick="doSearch()">Search</button>
    </div>

    <div class="status" id="status"></div>

    <div class="spinner" id="spinner"><div></div><div></div><div></div></div>

    <div id="content">
        <div class="empty-state" id="emptyState">

            <!-- Quick Artists -->
            <div class="section-label" style="text-align:left">your faves</div>
            <div class="artists-row" id="artistsRow"></div>

            <!-- Mood Collections -->
            <div class="collections">
                <div class="section-label" style="text-align:left">pick a mood</div>
                <div class="mood-grid" id="moodGrid"></div>
            </div>

        </div>
    </div>

    <div class="results" id="results"></div>

    <!-- Artist Profile View -->
    <div class="artist-profile" id="artistProfile">
        <button class="artist-back" onclick="closeArtistProfile()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15,18 9,12 15,6"/></svg>
            back
        </button>
        <div class="artist-hero">
            <img class="artist-hero-img" id="artistHeroImg" src="" alt="">
            <div class="artist-hero-info">
                <h2 id="artistHeroName"></h2>
                <p id="artistHeroSub"></p>
                <div class="artist-hero-actions">
                    <button class="btn-search" id="artistSearchBtn">search more songs</button>
                </div>
            </div>
        </div>
        <div id="artistAlbums"></div>
    </div>
</div>

<!-- Player -->
<div class="player" id="player">
    <div class="player-progress" id="progressBar" onclick="seekAudio(event)">
        <div class="player-progress-fill" id="progressFill"></div>
    </div>
    <div class="player-inner">
        <div class="player-info">
            <div class="p-title" id="pTitle">&mdash;</div>
            <div class="p-sub" id="pChannel"></div>
        </div>
        <div class="player-controls">
            <button class="ctrl-btn main-ctrl" id="playPauseBtn" onclick="togglePlayPause()">
                <svg id="iconPause" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
                <svg id="iconPlay" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="5,3 19,12 5,21"/></svg>
            </button>
        </div>
        <div class="player-time" id="playerTime">0:00 / 0:00</div>
        <button class="player-close" onclick="closePlayer()" title="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
    </div>
</div>
<audio id="audioPlayer"></audio>

<script>
    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const statusEl = document.getElementById('status');
    const resultsEl = document.getElementById('results');
    const emptyState = document.getElementById('emptyState');
    const spinnerEl = document.getElementById('spinner');
    const player = document.getElementById('player');
    const audioPlayer = document.getElementById('audioPlayer');
    const pTitle = document.getElementById('pTitle');
    const pChannel = document.getElementById('pChannel');
    const progressFill = document.getElementById('progressFill');
    const playerTime = document.getElementById('playerTime');
    const iconPlay = document.getElementById('iconPlay');
    const iconPause = document.getElementById('iconPause');

    let currentSongId = null;

    audioPlayer.addEventListener('timeupdate', () => {
        if (!audioPlayer.duration) return;
        const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
        progressFill.style.width = pct + '%';
        playerTime.textContent = formatDuration(audioPlayer.currentTime) + ' / ' + formatDuration(audioPlayer.duration);
    });

    audioPlayer.addEventListener('ended', () => {
        iconPause.style.display = 'none';
        iconPlay.style.display = '';
        progressFill.style.width = '0%';
        playNextInPlaylist();
    });

    // ========== VIEW NAVIGATION ==========
    function showLanding() {
        emptyState.style.display = '';
        resultsEl.innerHTML = '';
        statusEl.textContent = '';
        searchInput.value = '';
        if (typeof closeArtistProfile === 'function') closeArtistProfile();
    }

    function showResults() {
        emptyState.style.display = 'none';
        if (typeof closeArtistProfile === 'function') closeArtistProfile();
    }

    window.addEventListener('popstate', (e) => {
        if (e.state && e.state.view === 'search') {
            closeArtistProfile();
            searchInput.value = e.state.query || '';
            doSearch(false);
        } else if (e.state && e.state.view === 'artist') {
            loadArtistProfile(e.state.name);
        } else {
            showLanding();
            closeArtistProfile();
        }
    });

    // Replace initial state
    history.replaceState({ view: 'home' }, '', window.location.pathname);

    searchInput.addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
    });

    function quickSearch(q) {
        searchInput.value = q;
        doSearch(true);
    }

    function goHome() {
        history.pushState({ view: 'home' }, '', window.location.pathname);
        showLanding();
    }

    function openArtistProfile(name) {
        history.pushState({ view: 'artist', name }, '', `?artist=${encodeURIComponent(name)}`);
        loadArtistProfile(name);
    }

    function buildSongCard(song, idx) {
        const card = document.createElement('div');
        card.className = 'song-card';
        card.style.animationDelay = `${(idx - 1) * 0.04}s`;

        const dur = song.duration ? formatDuration(song.duration) : '';

        card.innerHTML = `
            <div class="song-num">${idx}</div>
            <img class="song-thumb" src="${escapeAttr(song.thumbnail)}" alt="" loading="lazy"
                 onerror="this.style.background='#fce7f3'">
            <div class="song-info">
                <div class="title" title="${escapeAttr(song.title)}">${escapeHtml(song.title)}</div>
                <div class="meta">
                    <span>${escapeHtml(song.channel)}</span>
                    ${dur ? `<span class="dot"></span><span>${dur}</span>` : ''}
                </div>
            </div>
            <span class="song-dur">${dur}</span>
            <button class="add-btn ${isInPlaylist(song.id) ? 'added' : ''}" title="Add to playlist"
                    onclick="addToPlaylist({id:'${escapeAttr(song.id)}', title:'${escapeAttr(song.title)}', channel:'${escapeAttr(song.channel)}', duration:${song.duration||0}, thumbnail:'${escapeAttr(song.thumbnail)}'}, this)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <button class="play-btn ${currentSongId === song.id ? 'active-song' : ''}"
                    data-id="${escapeAttr(song.id)}"
                    onclick="playSong(this, '${escapeAttr(song.id)}', '${escapeAttr(song.title)}', '${escapeAttr(song.channel)}')">
                <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
            </button>
        `;
        return card;
    }

    function renderSongList(songs) {
        songs.forEach((song, i) => {
            resultsEl.appendChild(buildSongCard(song, i + 1));
        });
    }

    async function doSearch(pushHistory = true) {
        const query = searchInput.value.trim();
        if (!query) return;

        if (pushHistory) {
            history.pushState({ view: 'search', query }, '', `?q=${encodeURIComponent(query)}`);
        }

        searchBtn.disabled = true;
        statusEl.className = 'status';
        statusEl.textContent = '';
        resultsEl.innerHTML = '';
        showResults();
        spinnerEl.classList.add('active');

        try {
            const resp = await fetch(`/api/search?q=${encodeURIComponent(query)}`);
            const data = await resp.json();

            if (!resp.ok) throw new Error(data.error || 'Search failed');

            if (data.results && data.results.length > 0) {
                statusEl.textContent = `${data.results.length} tracks`;
                renderSongList(data.results);
            } else if (data.grouped && data.groups) {
                const totalSongs = data.groups.reduce((s, g) => s + g.songs.length, 0);
                statusEl.textContent = `${totalSongs} tracks`;

                let globalIdx = 0;
                data.groups.forEach(group => {
                    if (group.album) {
                        const header = document.createElement('div');
                        header.className = 'album-header';
                        header.innerHTML = `
                            <span class="album-name">${escapeHtml(group.album)}</span>
                            <span class="album-count">${group.songs.length} track${group.songs.length !== 1 ? 's' : ''}</span>
                            <div class="album-bar"></div>
                        `;
                        resultsEl.appendChild(header);
                    } else if (data.groups.length > 1) {
                        const header = document.createElement('div');
                        header.className = 'album-header';
                        header.innerHTML = `
                            <span class="album-name" style="color:var(--text-secondary)">Other</span>
                            <div class="album-bar"></div>
                        `;
                        resultsEl.appendChild(header);
                    }

                    group.songs.forEach(song => {
                        globalIdx++;
                        resultsEl.appendChild(buildSongCard(song, globalIdx));
                    });
                });
            } else {
                statusEl.textContent = 'No results found. Try a different search.';
            }
        } catch (err) {
            statusEl.className = 'status error';
            statusEl.textContent = err.message;
        } finally {
            searchBtn.disabled = false;
            spinnerEl.classList.remove('active');
        }
    }

    async function playSong(btn, id, title, channel) {
        const allBtns = document.querySelectorAll('.play-btn');
        allBtns.forEach(b => b.disabled = true);

        btn.classList.add('loading');
        btn.innerHTML = '<svg viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="12" r="3"/></svg>';

        try {
            const resp = await fetch('/api/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, title }),
            });

            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Stream failed');

            audioPlayer.src = data.stream_url;
            pTitle.textContent = data.title;
            pChannel.textContent = channel;
            player.classList.add('active');
            audioPlayer.play();
            currentSongId = id;

            allBtns.forEach(b => b.classList.remove('active-song'));
            btn.classList.add('active-song');

            iconPause.style.display = '';
            iconPlay.style.display = 'none';
        } catch (err) {
            statusEl.className = 'status error';
            statusEl.textContent = err.message;
            setTimeout(() => { statusEl.textContent = ''; }, 4000);
        } finally {
            btn.classList.remove('loading');
            btn.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>';
            allBtns.forEach(b => b.disabled = false);
        }
    }

    function togglePlayPause() {
        if (audioPlayer.paused) {
            audioPlayer.play();
            iconPause.style.display = '';
            iconPlay.style.display = 'none';
        } else {
            audioPlayer.pause();
            iconPause.style.display = 'none';
            iconPlay.style.display = '';
        }
    }

    function seekAudio(e) {
        if (!audioPlayer.duration) return;
        const rect = e.currentTarget.getBoundingClientRect();
        const pct = (e.clientX - rect.left) / rect.width;
        audioPlayer.currentTime = pct * audioPlayer.duration;
    }

    function closePlayer() {
        audioPlayer.pause();
        audioPlayer.src = '';
        player.classList.remove('active');
        currentSongId = null;
        playlistIndex = -1;
        progressFill.style.width = '0%';
        playerTime.textContent = '0:00 / 0:00';
        document.querySelectorAll('.play-btn').forEach(b => b.classList.remove('active-song'));
        renderPlaylist();
    }

    function formatDuration(seconds) {
        if (!seconds || isNaN(seconds)) return '0:00';
        const m = Math.floor(seconds / 60);
        const s = Math.floor(seconds % 60);
        return `${m}:${s.toString().padStart(2, '0')}`;
    }

    function escapeHtml(str) {
        const div = document.createElement('div');
        div.textContent = str || '';
        return div.innerHTML;
    }

    function escapeAttr(str) {
        return (str || '').replace(/&/g, '&amp;').replace(/'/g, '&#39;')
            .replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ========== PLAYLIST ==========
    const plPanel = document.getElementById('plPanel');
    const plOverlay = document.getElementById('plOverlay');
    const plBody = document.getElementById('plBody');
    const plEmpty = document.getElementById('plEmpty');
    const plFooter = document.getElementById('plFooter');
    const plBadge = document.getElementById('plBadge');

    let playlist = JSON.parse(localStorage.getItem('sonora_playlist') || '[]');
    let playlistIndex = -1;

    function savePlaylist() {
        localStorage.setItem('sonora_playlist', JSON.stringify(playlist));
    }

    function isInPlaylist(id) {
        return playlist.some(s => s.id === id);
    }

    function addToPlaylist(song, btn) {
        if (isInPlaylist(song.id)) return;
        playlist.push(song);
        savePlaylist();
        if (btn) { btn.classList.add('added'); }
        renderPlaylist();
    }

    function removeFromPlaylist(idx) {
        playlist.splice(idx, 1);
        if (playlistIndex >= playlist.length) playlistIndex = -1;
        else if (idx < playlistIndex) playlistIndex--;
        else if (idx === playlistIndex) playlistIndex = -1;
        savePlaylist();
        renderPlaylist();
        // Update add-btn states in search results
        document.querySelectorAll('.add-btn').forEach(b => {
            const card = b.closest('.song-card');
            const playBtn = card?.querySelector('.play-btn');
            if (playBtn) {
                const id = playBtn.dataset.id;
                b.classList.toggle('added', isInPlaylist(id));
            }
        });
    }

    function clearPlaylist() {
        if (playlist.length === 0) return;
        playlist = [];
        playlistIndex = -1;
        savePlaylist();
        renderPlaylist();
        document.querySelectorAll('.add-btn').forEach(b => b.classList.remove('added'));
    }

    function togglePlaylist() {
        const open = plPanel.classList.toggle('open');
        plOverlay.classList.toggle('open', open);
    }

    function renderPlaylist() {
        const count = playlist.length;
        plBadge.textContent = count;
        plBadge.classList.toggle('visible', count > 0);
        plFooter.textContent = `${count} song${count !== 1 ? 's' : ''}`;

        if (count === 0) {
            plBody.innerHTML = '';
            plBody.appendChild(plEmpty);
            plEmpty.style.display = '';
            return;
        }

        plEmpty.style.display = 'none';
        plBody.innerHTML = '';

        playlist.forEach((song, i) => {
            const item = document.createElement('div');
            item.className = 'pl-item' + (i === playlistIndex ? ' pl-active' : '');
            item.innerHTML = `
                <div class="pl-item-num">${i + 1}</div>
                <div class="pl-item-info">
                    <div class="pl-item-title" title="${escapeAttr(song.title)}">${escapeHtml(song.title)}</div>
                    <div class="pl-item-channel">${escapeHtml(song.channel)}</div>
                </div>
                <button class="pl-item-play" onclick="playFromPlaylist(${i})">
                    <svg viewBox="0 0 24 24"><polygon points="8,5 19,12 8,19"/></svg>
                </button>
                <button class="pl-item-remove" onclick="removeFromPlaylist(${i})" title="Remove">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            `;
            plBody.appendChild(item);
        });
    }

    async function playFromPlaylist(idx) {
        if (idx < 0 || idx >= playlist.length) return;
        playlistIndex = idx;
        const song = playlist[idx];
        renderPlaylist();

        // Reuse playSong logic inline
        try {
            statusEl.className = 'status';
            statusEl.textContent = `Loading: ${song.title}`;
            const resp = await fetch('/api/stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id: song.id, title: song.title }),
            });
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Stream failed');

            audioPlayer.src = data.stream_url;
            pTitle.textContent = data.title;
            pChannel.textContent = song.channel;
            player.classList.add('active');
            audioPlayer.play();
            currentSongId = song.id;

            document.querySelectorAll('.play-btn').forEach(b => {
                b.classList.toggle('active-song', b.dataset.id === song.id);
            });
            iconPause.style.display = '';
            iconPlay.style.display = 'none';
            statusEl.textContent = '';
        } catch (err) {
            statusEl.className = 'status error';
            statusEl.textContent = err.message;
            setTimeout(() => { statusEl.textContent = ''; }, 4000);
        }
    }

    function playAllPlaylist() {
        if (playlist.length === 0) return;
        playFromPlaylist(0);
    }

    function playNextInPlaylist() {
        if (playlistIndex < 0 || playlist.length === 0) return;
        const next = playlistIndex + 1;
        if (next < playlist.length) {
            playFromPlaylist(next);
        }
    }

    // Init playlist UI on load
    renderPlaylist();

    // ========== MOOD COLLECTIONS ==========
    const moods = [
        { name: 'Romance',    cls: 'mood-romance',   sub: 'love songs & slow dances',  query: 'romantic love songs' },
        { name: 'Heartbreak', cls: 'mood-breakup',   sub: 'sad hours activated',       query: 'sad breakup songs' },
        { name: 'Gym Beast',  cls: 'mood-gym',       sub: 'pr or go home',             query: 'gym workout motivation songs' },
        { name: 'Chill',      cls: 'mood-chill',     sub: 'lofi & easy listening',     query: 'chill lofi vibes songs' },
        { name: 'Party',      cls: 'mood-party',     sub: 'turn it up!!',              query: 'party dance hits songs' },
        { name: 'In My Feels',cls: 'mood-sad',       sub: 'it\u2019s giving emotional', query: 'emotional sad songs' },
        { name: 'Road Trip',  cls: 'mood-road',      sub: 'windows down, volume up',   query: 'road trip sing along songs' },
        { name: 'Focus',      cls: 'mood-focus',     sub: 'study mode on',             query: 'instrumental focus study music' },
        { name: 'Hype',       cls: 'mood-hype',      sub: 'main character energy',     query: 'hype rap trap bangers' },
        { name: 'Throwback',  cls: 'mood-throwback', sub: 'nostalgia trip',            query: '2000s 2010s throwback hits' },
        { name: 'Bollywood',  cls: 'mood-bollywood', sub: 'desi beats',                query: 'bollywood hindi hit songs' },
        { name: 'Latino',     cls: 'mood-latino',    sub: 'dale!',                     query: 'reggaeton latin hits songs' },
    ];

    const artists = [
        { name: 'Taylor Swift',  wiki: 'Taylor_Swift' },
        { name: 'Little Mix',   wiki: 'Little_Mix' },
        { name: 'Sabrina Carpenter',  wiki: 'Sabrina_Carpenter' },
        { name: 'Dua Lipa',      wiki: 'Dua_Lipa' },
        { name: 'Ed Sheeran',    wiki: 'Ed_Sheeran' },
        { name: 'Ariana Grande', wiki: 'Ariana_Grande' }
    ];

    function getInitials(name) {
        return name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    }

    function renderLanding() {
        // Artists row
        const row = document.getElementById('artistsRow');
        row.innerHTML = '';
        artists.forEach(a => {
            const chip = document.createElement('div');
            chip.className = 'artist-chip';
            chip.onclick = () => openArtistProfile(a.name);
            chip.innerHTML = `
                <div class="artist-avatar" id="avatar-${a.wiki}">${getInitials(a.name)}</div>
                <div class="artist-label">${escapeHtml(a.name)}</div>
            `;
            row.appendChild(chip);
        });

        // Fetch artist photos from Wikipedia
        artists.forEach(a => {
            fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${a.wiki}`)
                .then(r => r.json())
                .then(data => {
                    const thumb = data.thumbnail?.source;
                    if (thumb) {
                        const el = document.getElementById(`avatar-${a.wiki}`);
                        if (el) el.innerHTML = `<img src="${thumb}" alt="${escapeAttr(a.name)}" loading="lazy">`;
                    }
                })
                .catch(() => {});
        });

        // Mood grid
        const grid = document.getElementById('moodGrid');
        grid.innerHTML = '';
        moods.forEach(m => {
            const card = document.createElement('div');
            card.className = `mood-card ${m.cls}`;
            card.onclick = () => quickSearch(m.query);
            card.innerHTML = `
                <div class="mood-name">${m.name}</div>
                <div class="mood-sub">${m.sub}</div>
            `;
            grid.appendChild(card);
        });
    }

    renderLanding();

    // ========== ARTIST PROFILE ==========
    const artistProfile = document.getElementById('artistProfile');
    const artistAlbums = document.getElementById('artistAlbums');
    const artistHeroImg = document.getElementById('artistHeroImg');
    const artistHeroName = document.getElementById('artistHeroName');
    const artistHeroSub = document.getElementById('artistHeroSub');
    const artistSearchBtn = document.getElementById('artistSearchBtn');

    function closeArtistProfile() {
        artistProfile.classList.remove('active');
    }

    async function loadArtistProfile(name) {
        // Show profile, hide other views
        emptyState.style.display = 'none';
        resultsEl.innerHTML = '';
        statusEl.textContent = '';
        artistProfile.classList.add('active');
        artistAlbums.innerHTML = '';
        artistHeroName.textContent = name;
        artistHeroSub.textContent = 'loading songs...';
        artistHeroImg.src = '';
        spinnerEl.classList.add('active');

        artistSearchBtn.onclick = () => {
            closeArtistProfile();
            searchInput.value = name;
            doSearch(true);
        };

        // Fetch Wikipedia photo
        const wikiName = name.replace(/ /g, '_');
        fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${wikiName}`)
            .then(r => r.json())
            .then(data => {
                if (data.thumbnail?.source) {
                    artistHeroImg.src = data.thumbnail.source;
                }
            })
            .catch(() => {});

        // Fetch artist data
        try {
            const resp = await fetch(`/api/artist?name=${encodeURIComponent(name)}`);
            const data = await resp.json();
            if (!resp.ok) throw new Error(data.error || 'Failed to load artist');

            const totalSongs = data.groups.reduce((s, g) => s + g.songs.length, 0);
            artistHeroSub.textContent = `${totalSongs} tracks found`;

            let globalIdx = 0;
            data.groups.forEach(group => {
                if (group.album) {
                    const header = document.createElement('div');
                    header.className = 'album-header';
                    header.innerHTML = `
                        <span class="album-name">${escapeHtml(group.album)}</span>
                        <span class="album-count">${group.songs.length} track${group.songs.length !== 1 ? 's' : ''}</span>
                        <div class="album-bar"></div>
                    `;
                    artistAlbums.appendChild(header);
                } else if (data.groups.length > 1) {
                    const header = document.createElement('div');
                    header.className = 'album-header';
                    header.innerHTML = `
                        <span class="album-name" style="color:var(--text-secondary)">Singles & Other</span>
                        <div class="album-bar"></div>
                    `;
                    artistAlbums.appendChild(header);
                }

                group.songs.forEach(song => {
                    globalIdx++;
                    artistAlbums.appendChild(buildSongCard(song, globalIdx));
                });
            });
        } catch (err) {
            artistHeroSub.textContent = err.message;
        } finally {
            spinnerEl.classList.remove('active');
        }
    }

    // Handle page load with URL params
    const urlQ = new URLSearchParams(window.location.search).get('q');
    const urlArtist = new URLSearchParams(window.location.search).get('artist');
    if (urlArtist) {
        loadArtistProfile(urlArtist);
    } else if (urlQ) {
        searchInput.value = urlQ;
        doSearch(false);
    }

    // ========== PWA & MEDIA SESSION ==========
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }

    function updateMediaSession(title, artist) {
        if (!('mediaSession' in navigator)) return;
        navigator.mediaSession.metadata = new MediaMetadata({
            title: title || 'Sonora',
            artist: artist || '',
            album: 'Sonora',
        });
        navigator.mediaSession.setActionHandler('play', () => { audioPlayer.play(); togglePlayPause(); });
        navigator.mediaSession.setActionHandler('pause', () => { audioPlayer.pause(); togglePlayPause(); });
        navigator.mediaSession.setActionHandler('nexttrack', () => { playNextInPlaylist(); });
    }

    // Hook media session for lock screen controls
    audioPlayer.addEventListener('play', () => {
        updateMediaSession(pTitle.textContent, pChannel.textContent);
    });
</script>
</body>
</html>
